name: Architecture diagrams

on:
  pull_request:
    paths:
      - 'docs/diagrams/**'
      - 'scripts/render-diagrams.mjs'
      - 'scripts/check-diagrams.mjs'
      - 'package.json'
  push:
    branches:
      - main
    paths:
      - 'docs/diagrams/**'
      - 'scripts/render-diagrams.mjs'
      - 'scripts/check-diagrams.mjs'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagrams:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Check diagram renders
        run: npm run check:diagrams
