name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

  workflow_dispatch:
env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt --component clippy --target wasm32-unknown-unknown

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install icon rendering tools
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin

      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-tools-wasm-pack-0.15.0-audit-0.22.2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tools-wasm-pack-0.15.0-audit-0.22.2-

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Audit Rust dependencies
        run: |
          if ! command -v cargo-audit >/dev/null 2>&1 || ! cargo audit --version | grep -q '0.22.2'; then
            cargo install cargo-audit --locked --version 0.22.2 --force
          fi
          cargo audit

      - name: Check WASM build
        run: cargo check --target wasm32-unknown-unknown

      - name: Install npm dependencies
        run: npm ci

      - name: Check deploy metadata
        run: npm run check:deploy-metadata

      - name: Check JavaScript syntax
        run: npm run check:js

      - name: Audit npm dependencies
        run: npm run audit:npm

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked --version 0.15.0 --force

      - name: Build web package
        run: npm run build

      - name: Smoke-test built site
        run: npm run smoke -- --require-browser

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --target wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked --version 0.15.0 --force

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Wires Sentry into the production build: error monitoring and the
          # in-app feedback button (which stays hidden unless a DSN is present).
          # The DSN is a public client key; it ships in the browser bundle.
          # Set the SENTRY_DSN repo secret to activate it.
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: production
          SENTRY_RELEASE: ${{ github.sha }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=galacto
