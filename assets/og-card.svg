<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Open Graph / Twitter social card (1200×630). Source for og-card.png;
       regenerate with `npm run icons`. -->
  <defs>
    <radialGradient id="bg" cx="22%" cy="50%" r="85%">
      <stop offset="0%" stop-color="#0c1233" />
      <stop offset="100%" stop-color="#05060d" />
    </radialGradient>
    <radialGradient id="galaxy" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e" />
      <stop offset="30%" stop-color="#16213e" />
      <stop offset="60%" stop-color="#0f3460" />
      <stop offset="100%" stop-color="#533483" />
    </radialGradient>
    <radialGradient id="stars" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- A scatter of faint background stars. -->
  <g fill="#ffffff">
    <circle cx="930" cy="90" r="2.4" opacity="0.7" />
    <circle cx="1080" cy="170" r="1.6" opacity="0.5" />
    <circle cx="760" cy="520" r="2" opacity="0.6" />
    <circle cx="1010" cy="470" r="1.4" opacity="0.45" />
    <circle cx="560" cy="110" r="1.6" opacity="0.5" />
    <circle cx="1130" cy="330" r="1.8" opacity="0.5" />
    <circle cx="640" cy="560" r="1.3" opacity="0.4" />
    <circle cx="880" cy="250" r="1.2" opacity="0.4" />
  </g>

  <!-- Galaxy mark (100×100 artwork), scaled and placed on the left. -->
  <g transform="translate(90,135) scale(3.6)">
    <circle cx="50" cy="50" r="45" fill="url(#galaxy)" stroke="#533483" stroke-width="2" />
    <path d="M50 50 Q60 30 70 50 Q60 70 50 50" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.7" />
    <path d="M50 50 Q40 30 30 50 Q40 70 50 50" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.7" />
    <path d="M50 50 Q70 40 50 30 Q30 40 50 50" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.7" />
    <path d="M50 50 Q70 60 50 70 Q30 60 50 50" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.7" />
    <circle cx="35" cy="25" r="1" fill="url(#stars)" />
    <circle cx="65" cy="35" r="0.8" fill="url(#stars)" />
    <circle cx="75" cy="60" r="1.2" fill="url(#stars)" />
    <circle cx="25" cy="65" r="0.9" fill="url(#stars)" />
    <circle cx="50" cy="50" r="3" fill="#ffd700" opacity="0.9" />
    <circle cx="50" cy="50" r="1.5" fill="#ffffff" />
  </g>

  <!-- Wordmark + tagline. -->
  <g font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
    <text x="500" y="300" font-size="116" font-weight="700" fill="#eef2ff">Galacto</text>
    <text x="503" y="360" font-size="34" font-weight="400" fill="#9aa6da">Self-gravitating galaxy sandbox</text>
    <text x="504" y="410" font-size="25" font-weight="600" fill="#5f6aa0" letter-spacing="3">RUST · WEBASSEMBLY · WEBGPU</text>
  </g>
</svg>
