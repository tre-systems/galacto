<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Open Graph / Twitter social card (1200×630). Source for og-card.png;
       regenerate with `npm run icons`. The galaxy mark matches static/favicon.svg. -->
  <defs>
    <radialGradient id="bg" cx="22%" cy="50%" r="85%">
      <stop offset="0%" stop-color="#0c1233" />
      <stop offset="100%" stop-color="#05060d" />
    </radialGradient>
    <radialGradient id="disk">
      <stop offset="0" stop-color="#0e1640" />
      <stop offset="0.6" stop-color="#090e22" />
      <stop offset="1" stop-color="#05060d" />
    </radialGradient>
    <radialGradient id="glow">
      <stop offset="0" stop-color="#5274e0" stop-opacity="0.6" />
      <stop offset="0.5" stop-color="#314a98" stop-opacity="0.22" />
      <stop offset="1" stop-color="#2a3e86" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="arm" gradientUnits="userSpaceOnUse" cx="50" cy="50" r="44">
      <stop offset="0.16" stop-color="#d6c6ff" />
      <stop offset="0.5" stop-color="#88adff" />
      <stop offset="0.85" stop-color="#92e6ff" />
      <stop offset="1" stop-color="#92e6ff" stop-opacity="0.5" />
    </radialGradient>
    <radialGradient id="core">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="0.42" stop-color="#ffe1a8" />
      <stop offset="0.72" stop-color="#ffba63" />
      <stop offset="1" stop-color="#ffab47" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- A scatter of faint background stars. -->
  <g fill="#ffffff">
    <circle cx="930" cy="90" r="2.4" opacity="0.7" />
    <circle cx="1080" cy="170" r="1.6" opacity="0.5" />
    <circle cx="760" cy="520" r="2" opacity="0.6" />
    <circle cx="1010" cy="470" r="1.4" opacity="0.45" />
    <circle cx="560" cy="110" r="1.6" opacity="0.5" />
    <circle cx="1130" cy="330" r="1.8" opacity="0.5" />
    <circle cx="640" cy="560" r="1.3" opacity="0.4" />
    <circle cx="880" cy="250" r="1.2" opacity="0.4" />
  </g>

  <!-- Spiral-galaxy mark (100×100 artwork), scaled and placed on the left. -->
  <g transform="translate(96,140) scale(3.55)">
    <circle cx="50" cy="50" r="49" fill="url(#disk)" />
    <circle cx="50" cy="50" r="44" fill="url(#glow)" />
    <g fill="none" stroke="url(#arm)" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M61.08 56.79 L60.30 58.46 L59.27 60.04 L58.01 61.49 L56.52 62.80 L54.82 63.91 L52.94 64.81 L50.91 65.45 L48.75 65.82 L46.51 65.89 L44.22 65.65 L41.94 65.08 L39.69 64.18 L37.54 62.95 L35.53 61.41 L33.70 59.55 L32.10 57.41 L30.78 55.01 L29.78 52.39 L29.13 49.59 L28.86 46.65 L29.01 43.63 L29.57 40.58 L30.58 37.56 L32.02 34.64 L33.90 31.88 L36.20 29.33 L38.89 27.07 L41.93 25.16 L45.30 23.64 L48.93 22.56 L52.77 21.99 L56.74 21.94 L60.79 22.45 L64.83 23.54 L68.78 25.21 L72.55 27.46 L76.07 30.28 L79.24 33.63 L82.00 37.48 L84.26 41.78 L85.94 46.47 L87.00 51.46 L87.37 56.68 L87.01 62.04 L85.90 67.42 L84.01 72.74 L81.35 77.87 L77.92 82.70" />
      <path d="M38.92 43.21 L39.70 41.54 L40.73 39.96 L41.99 38.51 L43.48 37.20 L45.18 36.09 L47.06 35.19 L49.09 34.55 L51.25 34.18 L53.49 34.11 L55.78 34.35 L58.06 34.92 L60.31 35.82 L62.46 37.05 L64.47 38.59 L66.30 40.45 L67.90 42.59 L69.22 44.99 L70.22 47.61 L70.87 50.41 L71.14 53.35 L70.99 56.37 L70.43 59.42 L69.42 62.44 L67.98 65.36 L66.10 68.12 L63.80 70.67 L61.11 72.93 L58.07 74.84 L54.70 76.36 L51.07 77.44 L47.23 78.01 L43.26 78.06 L39.21 77.55 L35.17 76.46 L31.22 74.79 L27.45 72.54 L23.93 69.72 L20.76 66.37 L18.00 62.52 L15.74 58.22 L14.06 53.53 L13.00 48.54 L12.63 43.32 L12.99 37.96 L14.10 32.58 L15.99 27.26 L18.65 22.13 L22.08 17.30" />
